# Configuración de la base de datos MySQL
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/aplicacion_web
db.user=root
db.password=root
db.pool.size=5

# Configuración de la aplicación
app.name=GR05_1BT2_622_26A
